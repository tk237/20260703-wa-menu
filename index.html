<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>メニュー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h2>メニュー</h2>
        <p class="menu">{{ name }}</p>

    </div>
    
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="script.js"></script>
</body>
</html>
